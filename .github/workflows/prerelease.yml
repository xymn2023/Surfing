name: prerelease
run-name: ${{ github.event.head_commit.message || 'Scheduled Run' }}

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Branch
        uses: actions/checkout@v6
        with:
          ref: data

      - name: Update Count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE_FILE=".stats_state"
          if [ ! -f "$STATE_FILE" ]; then
            echo "API_LAST_COUNT=0" > "$STATE_FILE"
            echo "BASE_COUNT=35000" >> "$STATE_FILE"
          fi
          source "$STATE_FILE"

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases)
          CURRENT_COUNT=$(echo "$RESPONSE" | jq '[.[]? | .assets[]? | .download_count] | add // 0')

          if [ "$CURRENT_COUNT" -lt "$API_LAST_COUNT" ]; then
            LOST_COUNT=$((API_LAST_COUNT - CURRENT_COUNT))
            BASE_COUNT=$((BASE_COUNT + LOST_COUNT))
            echo "Detected download count reset. Added $LOST_COUNT to base. New base is $BASE_COUNT."
          fi

          TOTAL_COUNT=$((CURRENT_COUNT + BASE_COUNT))

          echo "API_LAST_COUNT=$CURRENT_COUNT" > "$STATE_FILE"
          echo "BASE_COUNT=$BASE_COUNT" >> "$STATE_FILE"

          if [ $TOTAL_COUNT -ge 1000 ]; then
            DISPLAY_COUNT=$(echo "scale=1; $TOTAL_COUNT/1000" | bc | sed 's/\.0$//')k
          else
            DISPLAY_COUNT=$TOTAL_COUNT
          fi

          jq ".message = \"$DISPLAY_COUNT\"" stats.json > temp.json && mv temp.json stats.json

      - name: Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stats.json .stats_state
          git commit -m "chore: sync download metrics to data" || exit 0
          git push origin data

  build-alpha:
    needs: update-stats
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    env:
      isAlpha: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: main

      - name: Set Timestamp
        id: set_timestamp
        run: echo "TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Get Short Commit Hash
        run: echo "SHORT_HASH=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Run build.sh
        run: sh build.sh

      - name: Delete current prerelease assets
        uses: andreaswilli/delete-release-assets-action@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: Prerelease-Alpha
          deleteOnlyFromDrafts: false

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: Prerelease-Alpha

      - name: Upload Prerelease
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: Prerelease-Alpha
          files: Surfing_alpha_${{ env.SHORT_HASH }}.zip
          prerelease: true
          generate_release_notes: true
          body: |
            Synchronize the latest code updates of branches and keep only the latest version  
            
            Release Timestamp: ${{ env.TIMESTAMP }}